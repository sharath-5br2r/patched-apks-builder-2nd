name: Build

on:
  workflow_call:
    inputs:
      config_file:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      config_file:
        description: "Select the config file to use"
        required: true
        type: choice
        default: ".github/configs/config.manual.toml"
        options:
          - ".github/configs/config.manual.toml"
          - ".github/configs/config.dev.updated.json"
          - ".github/configs/config.stable.updated.json"
          - ".github/configs/config.photos.toml"
          - ".github/configs/config.revanced.toml"
          - ".github/configs/config.piko.toml"

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Resolve build context
        id: context
        run: bash .github/scripts/build_resolve_context.sh "${{ inputs.config_file }}"

      - name: Resolve version code
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/build_resolve_version.sh

      - name: Build modules and apks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
        run: |
          set -euo pipefail
          ./build.sh "${{ steps.context.outputs.CONFIG_FILE }}"

      - name: Get output
        id: get_output
        run: bash .github/scripts/build_get_output.sh

      - name: Update readme
        run: |
          python3 update-readme.py ${{ steps.version.outputs.NEXT_VER_CODE }} "$GITHUB_REPOSITORY"

      - name: Commit updated readme
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          skip_checkout: true
          file_pattern: README.md
          commit_message: "Update README for Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} [skip ci]"

      - name: Upload to release (Archive)
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./build/*
          tag_name: ${{ steps.context.outputs.ARCHIVE_TAG }}
          overwrite_files: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./build/*
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          overwrite_files: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}

      - name: Notify telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_THREAD_ID: ${{ steps.context.outputs.TG_THREAD_ID }}
          TITLE_SUFFIX: ${{ steps.context.outputs.TITLE_SUFFIX }}
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/build_notify_telegram.sh

      - name: Update changelog and module update files
        env:
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/build_update_changelog.sh

      - name: Commit updated build and module update files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          skip_checkout: true
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.version.outputs.NEXT_VER_CODE }}
