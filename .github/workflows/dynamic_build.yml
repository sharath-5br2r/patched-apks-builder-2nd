name: Build dynamic Patches
permissions: write-all
on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-levilauncher:
    runs-on: ubuntu-latest
    outputs:
      LEVILAUNCHER_TAG: ${{ steps.sign_apk.outputs.LEVILAUNCHER_TAG }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get LeviLauncher tag
        id: get_tags
        run:  |
            echo "LEVILAUNCHER_TAG=$(gh release view -R 0Sombra666/LeviLaunchroidUnlocked --json tagName --jq '.tagName' )" >> $GITHUB_ENV
            echo "LEVILAUNCHER_TAG=$LEVILAUNCHER_TAG" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Clone code
        run: |
          git clone --depth 1 --branch ${{ env.LEVILAUNCHER_TAG }} https://github.com/0Sombra666/LeviLaunchroidUnlocked.git --recursive --shallow-submodules levilauncher
      - name: Prepare google-services.json
        run: |
          mkdir -p levilauncher/app
          cat > levilauncher/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-placeholder",
              "storage_bucket": "ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.pubg.imobile"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyCIOnlyPlaceholderKey"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install Build Tools 35.0.0
        run: sdkmanager "build-tools;35.0.0"

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "2.9.9"
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: "ubuntulinux-ci"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          link-to-sdk: true

      - name: Grant Execute Permission to gradlew
        run: | 
            chmod +x ./levilauncher/gradlew
    
      - name: Inject API Key
        run: echo "curseforge.api_key=$2a$10$bL4bIL5pUWqfcO7KQtnMReakwtfHbNKh6v1uTpKlzhwoueEJQnPnm" >> levilauncher/local.properties
     
      - name: Patch
        run:  |
          sed -i 's/applicationId "org\.levimc\.launcher"/applicationId "com.pubg.imobile"/' levilauncher/app/build.gradle
          sed -i 's#<string name="app_name">LeviLauncher Unlocked</string>#<string name="app_name">LeviLauncher Unlocked (BGMI)</string>#' levilauncher/app/src/main/res/values/strings.xml
          
      - name: Build Release APKs
        run: |
         ./levilauncher/gradlew assembleRelease -p levilauncher


      - name: Extract keystore
        run: |
          echo "${{ secrets.KEYSTORE_P12}}" | base64 -d > ks.keystore
      - name: Install apksigner
        run: |
         wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
         unzip -q -j sdk.zip android-16/lib/apksigner.jar

      - name: Sign APK with keystore
        id: sign_apk
        run: |
          APK_IN=$(find levilauncher/app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_OUT="levilauncher-unlocked-bgmi-$LEVILAUNCHER_TAG.apk"
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign    --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in "$APK_IN" --out "$APK_OUT"
          echo "LEVILAUNCHER_TAG=$LEVILAUNCHER_TAG" >> $GITHUB_OUTPUT
       
          
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: levilauncher-unlocked-bgmi-${{ env.LEVILAUNCHER_TAG }}.apk
          archive: false
  build-geode:
    needs: build-levilauncher
    runs-on: ubuntu-latest
    if: always()
    outputs:
      GEODE_TAG: ${{ steps.sign_apk.outputs.GEODE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get Geode Tag
        id: get_tags
        run:  |
            echo "GEODE_TAG=$(gh release view -R geode-sdk/android-launcher --json tagName --jq '.tagName' )" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Code
        run: |
          git clone --depth 1 --branch ${{ env.GEODE_TAG }}  https://github.com/geode-sdk/android-launcher.git --recursive --shallow-submodules geode

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Fix gradle permissions
        run: chmod +x ./geode/gradlew

      - name: Patch
        run: |
          sed -i 's/applicationId = "com\.geode\.launcher"/applicationId = "com.pubg.krmobile"/' geode/app/build.gradle.kts
          sed -i 's#<string name="app_name" translatable="false">Geode</string>#<string name="app_name" translatable="false">Geode (PUBG:KR)</string>#' geode/app/src/main/res/values/strings.xml

      - name: Build project
        run: |
          ./geode/gradlew app:assembleRelease -p geode

      - name: Sign universal apk and sign
        id: sign_apk
        run: |
          APK_PATH=${{github.workspace}}/geode/app/build/outputs/apk/release/app-universal-release-unsigned.apk
          echo "${{ secrets.KEYSTORE_P12 }}" | base64 --decode > ks.keystore   
          wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
          unzip -q -j sdk.zip android-16/lib/apksigner.jar
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in $APK_PATH --out "./geode-pubgkr-v$GEODE_TAG.apk"
          echo "GEODE_TAG=$GEODE_TAG" >> $GITHUB_OUTPUT
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: geode-pubgkr-v${{ env.GEODE_TAG }}.apk
          archive: false
  build-fcl:
    needs: [build-levilauncher, build-geode]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      FCL_TAG: ${{ steps.sign_apk.outputs.FCL_TAG }}
    env:
      OAUTH_API_KEY: ${{ secrets.FCL_OAUTH_KEY }}
      CURSE_API_KEY: "$2a$10$bL4bIL5pUWqfcO7KQtnMReakwtfHbNKh6v1uTpKlzhwoueEJQnPnm"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get FCL Tag
        id: get_tags
        run:  |
            echo "FCL_TAG=$(gh release view -R FCL-Team/FoldCraftLauncher --json tagName --jq '.tagName' )" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clone Code
        run: |
          git clone --depth 1 --branch ${{ env.FCL_TAG }} https://github.com/FCL-Team/FoldCraftLauncher.git --recursive --shallow-submodules fcl
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle
      - name: Fix gradle permissions
        run: chmod +x ./fcl/gradlew
      - name: Patch
        run: |
          sed -i 's/signingConfig = signingConfigs\.getByName("FCLKey")/signingConfig = signingConfigs.getByName("FCLDebugKey")/' fcl/FCL/build.gradle.kts
          sed -i 's/applicationId = "com\.tungsten\.fcl"/applicationId = "com.activision.callofduty.shooter"/' fcl/FCL/build.gradle.kts
          sed -i 's#<string name="app_name" translatable="false">Fold Craft Launcher</string>#<string name="app_name" translatable="false">Fold Craft Launcher (CoDM)</string>#' fcl/FCL/src/main/res/values/strings.xml
      - name: Build project
        run: |
          ./fcl/gradlew assemblerelease -Darch=all -p fcl
      - name: Sign APK with keystore
        id: sign_apk
        run: |
          echo "${{ secrets.KEYSTORE_P12 }}" | base64 --decode > ks.keystore
          wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
          unzip -q -j sdk.zip android-16/lib/apksigner.jar
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in ./fcl/FCL/build/outputs/apk/release/*.apk --out "./fcl-cod-v$FCL_TAG.apk"
          echo "FCL_TAG=$FCL_TAG" >> $GITHUB_OUTPUT
        
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./fcl-cod-v${{ env.FCL_TAG }}.apk
          archive: false
  release:
    runs-on: ubuntu-latest
    needs: [build-levilauncher, build-geode, build-fcl]
    if: ${{ always() && (needs.build-levilauncher.result == 'success' || needs.build-geode.result == 'success' || needs.build-fcl.result == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve build context
        id: context
        run: bash .github/scripts/build_resolve_context.sh custom

      - name: Resolve version code
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/build_resolve_version.sh
    
      - name: Generate build.md and build.json
        run: |
           echo -e "{" >> build.json
           if [ -n "$LEVILAUNCHER_TAG" ]; then
             echo -e "\"levilauncher-bgmi\": { \"exts\": [\"apk\"], \"name\": \"levilauncher-bgmi\",\"arch\": \"all\",\"patch\": \"bgmi\", \"version\": \"$LEVILAUNCHER_TAG\" }," >> build.json
             echo  -e "Patched and signed the following APK:\n- levilauncher-unlocked-bgmi-$LEVILAUNCHER_TAG.apk\n" >> build.md
           fi
           if [ -n "$GEODE_TAG" ]; then
             echo -e "\"geode-pubgkr\": { \"exts\": [\"apk\"], \"name\": \"geode-pubgkr\",\"arch\": \"all\",\"patch\": \"pubgkr\", \"version\": \"$GEODE_TAG\" }," >> build.json
             echo  -e "Patched and signed the following APK:\n- geode-pubgkr-$GEODE_TAG.apk\n" >> build.md
           fi
           if [ -n "$FCL_TAG" ]; then
             echo -e "\"fcl-cod\": { \"exts\": [\"apk\"], \"name\": \"fcl-cod\",\"arch\": \"all\",\"patch\": \"cod\", \"version\": \"$FCL_TAG\" }" >> build.json
             echo  -e "Patched and signed the following APK:\n- fcl-cod-$FCL_TAG.apk\n" >> build.md
           fi
           echo -e "}" >> build.json
        env:
          LEVILAUNCHER_TAG: ${{ needs.build-levilauncher.outputs.LEVILAUNCHER_TAG }}
          GEODE_TAG: ${{ needs.build-geode.outputs.GEODE_TAG }}
          FCL_TAG: ${{ needs.build-fcl.outputs.FCL_TAG }}

      - name: Get output
        id: get_output
        run: bash .github/scripts/build_get_output.sh

      - name: Update readme
        run: |
          python3 update-readme.py ${{ steps.version.outputs.NEXT_VER_CODE }} "$GITHUB_REPOSITORY"

      - name: Commit updated readme
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          skip_checkout: true
          file_pattern: README.md
          commit_message: "Update README for Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} [skip ci]"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: .

      - name: Upload to release (Archive)
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
              ./*/*.apk
          tag_name: ${{ steps.context.outputs.ARCHIVE_TAG }}
          overwrite_files: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
             ./*/*.apk
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          overwrite_files: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}
  
      
