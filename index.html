<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Fast, clean catalog for the latest patched (ReVanced, Revanced Extended, MorpheApp, RVX Morphed, and Revanced Advanced) Android apps and Magisk/KSU modules.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="NullStore">
    <meta property="og:description"
        content="Fast, clean catalog for the latest patched (ReVanced, Revanced Extended, MorpheApp, RVX Morphed, and Revanced Advanced) Android apps and Magisk/KSU modules.">
    <meta property="og:url" content="https://nullcpy.github.io/">
    <meta property="og:image" content="https://nullcpy.github.io/social-preview.svg">
    <meta property="og:image:type" content="image/svg+xml">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="NullStore">
    <meta name="twitter:description"
        content="Fast, clean catalog for the latest patched (ReVanced, Revanced Extended, MorpheApp, RVX Morphed, and Revanced Advanced) Android apps and Magisk/KSU modules.">
    <meta name="twitter:image" content="https://nullcpy.github.io/social-preview.svg">
    <title>NullStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='14' y='20' width='72' height='70' rx='10' fill='%230B1220'/><path d='M30 30v-6c0-9 8-16 20-16s20 7 20 16v6' fill='none' stroke='%2300D084' stroke-width='7' stroke-linecap='round'/><text x='50' y='56' text-anchor='middle' dominant-baseline='middle' font-size='60' font-family='Arial,sans-serif' font-weight='700' fill='%2300D084'>&#248;</text></svg>">
</head>

<body>
    <div class="theme-toggle" id="actionMenu">
        <button id="menuBtn" aria-label="Menu" aria-expanded="false">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="action-buttons">
            <button id="themeBtn" aria-label="Theme mode: system">🖥️</button>
            <a href="https://github.com/nullcpy/rvb/issues/new/choose" id="issueBtn" aria-label="Report Issue" target="_blank" rel="noopener noreferrer">🐛</a>
            <a href="https://t.me/rvb27/1094" id="announcementBtn" aria-label="Announcement" target="_blank" rel="noopener noreferrer">📢</a>
        </div>
    </div>

    <header>
        <div class="container">
            <h1>NullStore</h1>
            <div class="top-links" aria-label="Community links">
                <a href="https://github.com/nullcpy/rvb" target="_blank" rel="noopener noreferrer" class="top-link"
                    aria-label="GitHub" title="GitHub">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="top-link-icon"
                        fill="currentColor">
                        <path
                            d="M12 0C5.37 0 0 5.37 0 12a12 12 0 0 0 8.2 11.38c.6.11.82-.26.82-.58v-2.24c-3.34.73-4.04-1.42-4.04-1.42-.55-1.4-1.34-1.77-1.34-1.77-1.1-.75.08-.73.08-.73 1.21.09 1.85 1.25 1.85 1.25 1.08 1.84 2.83 1.31 3.52 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.16 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 5.8c1.02 0 2.05.14 3.01.41 2.29-1.55 3.3-1.23 3.3-1.23.66 1.64.24 2.86.12 3.16.77.84 1.24 1.91 1.24 3.22 0 4.61-2.8 5.62-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57A12 12 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
                    </svg>
                </a>
                <a href="https://fahim-ahmed05.github.io/donate" target="_blank" rel="noopener noreferrer"
                    title="Donate" class="top-link donate-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="top-link-icon"
                        fill="currentColor">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                </a>
                <a href="https://t.me/rvb27" target="_blank" rel="noopener noreferrer" class="top-link"
                    aria-label="Telegram" title="Telegram">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="top-link-icon"
                        fill="currentColor">
                        <path
                            d="M9.04 15.4 8.7 20.2c.49 0 .7-.21.95-.46l2.28-2.18 4.73 3.46c.87.48 1.48.23 1.71-.8l3.1-14.53h.01c.27-1.25-.45-1.74-1.29-1.43L1.9 11.34c-1.22.47-1.2 1.15-.2 1.46l4.68 1.46L17.25 7.4c.51-.33.98-.15.6.18" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="update-pill">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span id="lastUpdateText">Checking for updates...</span>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="search-box">
                <div class="search-input-wrap">
                    <input type="text" id="searchInput" placeholder="Search apps...">
                    <button type="button" id="searchClearBtn" aria-label="Clear search">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="filter-buttons" id="appFilterButtons">
                    <button class="filter-btn active" data-filter="all" type="button">All</button>
                    <button class="filter-btn" data-filter="recent" type="button">Recently Updated</button>
                    <button class="filter-btn" data-filter="popular" type="button">Popular</button> <button
                        class="filter-btn" data-filter="google" type="button">Google</button>
                    <button class="filter-btn" data-filter="meta" type="button">Meta</button>
                </div>

                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Fetching latest builds...</p>
                </div>

                <div id="builds" class="builds-grid"></div>

                <div id="error" class="error-message" style="display: none;"></div>
            </div>
    </main>

    <div id="patchModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="patchModalTitle">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <h2 id="patchModalTitle">Patch builds</h2>
                    <div class="modal-filter-buttons">
                        <button class="modal-filter-btn active" data-filter="all" type="button">All</button>
                        <button class="modal-filter-btn" data-filter="stable" type="button">Stable</button>
                        <button class="modal-filter-btn" data-filter="beta" type="button">Beta</button>
                        <button class="modal-filter-btn" data-filter="variant" type="button">Variant</button>
                    </div>
                </div>
                <div class="modal-header-right">
                    <button type="button" class="modal-obtainium-btn" id="obtainiumBtn"
                        aria-label="Install with Obtainium">Install with Obtainium</button>
                    <button type="button" class="modal-close" aria-label="Close popup">×</button>
                </div>
            </div>
            <div id="patchModalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="obtainiumModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="obtainiumTitle">
            <div class="modal-header">
                <h2 id="obtainiumTitle">Install with Obtainium</h2>
                <button type="button" class="modal-close" aria-label="Close popup">×</button>
            </div>
            <div id="obtainiumBody" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
